---
TagFormat: controller-v(?P<major>[1-9])\.(?P<minor>[[:digit:]]+)\.(?P<patch>[[:digit:]]+)
TagSemverFormat: "v${major}.${minor}.${patch}"
Comparator: '0'
BranchTemplate: feature/${major}.${minor}.${patch}
MasterBranchTemplate: oracle/release/${major}.${minor}.${patch}
TemplateDirectory: "${major}.${minor}"
SemverTagFilter: "> 1.9.7"
